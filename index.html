<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Sayı Toplama</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    min-height:100vh;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
}

h2{
    margin:0 0 18px 0;
    text-align:center;
    font-size:20px;
    color:#2c3e50;
}

.input-group{
    margin-bottom:14px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:#6b7a90;
    font-weight:500;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:15px;
    text-align:center;
    transition:.15s;
}

input:focus{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

.clear-btn{
    width:46px;
    min-width:46px;
    height:46px;
    border-radius:8px;
    background:#3498db;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.main-btn{
    flex:1;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    background:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.15s;
}

.main-btn.clicked{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

.reset-btn{
    width:46px;
    min-width:46px;
    height:46px;
    border-radius:8px;
    border:1.5px solid #c9d2dc;
    background:#fff;
    cursor:pointer;
    font-size:18px;
    transition:.15s;
}

.reset-btn.active{
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

.result{
    display:none;
    margin-top:18px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.result p{
    margin:0;
    font-weight:600;
    color:#2c3e50;
}

.highlight{
    float:right;
    font-weight:700;
}

.total{
    color:#27ae60;
    font-size:22px;
}

.creator{
    margin-top:auto;
    padding-top:15px;
    text-align:center;
    font-size:12px;
    color:#9aa6b2;
}

</style>
</head>

<body>

<div class="container">

<h2>8 Sayı Toplama</h2>

<div id="kutular"></div>

<div class="button-row">
    <button class="main-btn" id="hesaplaBtn" onclick="toplamHesapla()">Hesapla</button>
    <button class="reset-btn" onclick="resetle(event)">↺</button>
</div>

<div class="result" id="sonucAlani">
    <p>
        Toplam
        <span class="highlight total" id="toplamSonuc">0,00</span>
    </p>
</div>

<div class="creator">Created by Fatih Mersin</div>

</div>

<script>

// INPUTLAR
for(let i=1;i<=8;i++){

    document.getElementById("kutular").innerHTML += `
    <div class="input-group">
        <label>${i}. Sayı</label>
        <div class="field-container">

            <input type="text"
            id="sayi${i}"
            inputmode="decimal"
            oninput="resetUI()"
            onkeydown="enterKontrol(event,${i})">

            <div class="clear-btn" onclick="temizle('sayi${i}')">×</div>

        </div>
    </div>`;
}

// ENTER GEÇİŞ
function enterKontrol(e,i){
    if(e.key==="Enter"){
        e.preventDefault();

        if(i<8){
            document.getElementById("sayi"+(i+1)).focus();
        }else{
            toplamHesapla();
        }
    }
}

// TEMİZLE
function temizle(id){
    document.getElementById(id).value="";
    resetUI();
    setTimeout(()=>document.getElementById(id).focus(),10);
}

// PARSE
function parseTR(v){
    return parseFloat(v.trim().replace(/\./g,"").replace(",", ".")) || 0;
}

// TOPLAM
function toplamHesapla(){

    // 🔥 tüm focusları kaldır (yeşil glow gider)
    document.querySelectorAll("input").forEach(i => i.blur());

    document.getElementById("hesaplaBtn").classList.add("clicked");

    let toplam=0;

    for(let i=1;i<=8;i++){
        toplam += parseTR(document.getElementById("sayi"+i).value);
    }

    document.getElementById("toplamSonuc").innerText =
    toplam.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById("sonucAlani").style.display="block";
}

// RESET UI
function resetUI(){

    // 🔥 focus temizle
    document.querySelectorAll("input").forEach(i => i.blur());

    document.getElementById("hesaplaBtn").classList.remove("clicked");
    document.getElementById("sonucAlani").style.display="none";
    document.querySelector(".reset-btn").classList.remove("active");
}

// RESET
function resetle(e){

    e.preventDefault();

    document.querySelectorAll("input").forEach(i=>i.value="");

    resetUI();

    document.querySelector(".reset-btn").classList.add("active");
}

</script>

</body>
</html>
