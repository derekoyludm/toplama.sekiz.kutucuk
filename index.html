<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, user-scalable=no">
<title>8 Sayı Toplama</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

/* 🟢 Hem bilgisayarda hem telefonda dikey ve yatay tam ortalama sağlayan esnek yapı */
body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height: 100vh;
}

/* 🟢 Kutunun genişlik dengesini hem PC hem mobil için koruyan alan */
.container{
    width:100%;
    max-width:440px; /* Standart ideal genişlik */
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    margin: auto; 
}

h2{
    margin:0 0 18px 0;
    text-align:center;
    font-size:18px;
    font-weight:600;
    color:#2c3e50;
}

.input-group{
    margin-bottom:14px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input,
button{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:16px; 
    text-align:center;
    background:#fff;
    font-weight:400;
    transition:.15s;
}

/* 🟢 Mobil cihazlarda input'a tıklayınca sayfanın otomatik zoom yapmasını engeller */
input:focus {
    font-size: 16px !important;
}

input:focus {
    outline: none !important;
    -webkit-fullscreen-control-style: none;
    border-color: #8fd4ae !important;
    box-shadow: 0 0 0 4px rgba(143,212,174,0.45) !important;
}

.main-btn{
    flex:1;
    background:#fff;
    color:#2c3e50;
    font-weight:600;
    cursor:pointer;
    border:1.5px solid #c9d2dc;
    transition:.15s;
}

.main-btn:hover{
    background:#f6f8fa;
}

.main-btn:focus,
.main-btn:active{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

/* 🟢 Hesapla butonuna basıldığında aktif kalacak stil */
button.clicked-blue{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

.reset-btn{
    width:46px;
    min-width:46px;
    background:#fff;
    color:#2c3e50;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.15s;
}

.reset-btn:hover{
    background:#f6f8fa;
}

.reset-btn:focus,
.reset-btn:active,
.reset-btn.active-reset{
    outline:none;
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

.clear-btn{
    width:40px;
    height:46px;
    min-width:40px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    user-select: none;
}

.clear-btn:hover{
    background:#2587ca;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.result{
    display:none;
    margin-top:20px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.result p{
    margin:0;
    font-size:15px;
    font-weight:600;
    color:#2c3e50;
    line-height:26px;
}

.highlight{
    float:right;
    font-weight:700;
}

.total{
    color:#27ae60;
    font-size:22px;
}

.creator{
    margin-top:22px;
    text-align:center;
    font-size:12px;
    color:#9aa6b2;
    letter-spacing:.4px;
}

</style>
</head>

<body>

<div class="container">

<h2>8 Sayı Toplama</h2>

<div id="kutular"></div>

<div class="button-row">
    <button id="hesaplaBtn" class="main-btn" onclick="toplamHesapla()">Hesapla</button>
    <button class="reset-btn" onclick="sifirla(event)">↺</button>
</div>

<div class="result" id="sonucAlani">
    <p>
        Toplam
        <span class="highlight total" id="toplamSonuc">0,00</span>
    </p>
</div>

<div class="creator">Created by Fatih Mersin</div>

</div>

<script>

// Dinamik Input Oluşturma
for(let i=1; i<=8; i++){
    document.getElementById("kutular").innerHTML += `
    <div class="input-group">
        <label>${i}. Sayı</label>
        <div class="field-container">
            <input type="text" id="sayi${i}" inputmode="decimal">
            <div class="clear-btn" ontouchstart="temizle(event,'sayi${i}')" onclick="temizle(event,'sayi${i}')">×</div>
        </div>
    </div>`;
}

// Temizleme Fonksiyonu
function temizle(e,id){
    e.preventDefault();
    e.stopPropagation();
    
    let el = document.getElementById(id);
    el.value = ""; 
    hesapGecersizYap(); 
    
    el.focus();
    
    setTimeout(() => {
        el.focus();
        if(typeof el.setSelectionRange === "function") {
            el.setSelectionRange(0, 0); 
        }
    }, 10);
}

// Türkçe Formatlı Değer Okuma
function parseTR(id){
    let v = document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(/,/g,".")) || 0;
}

// Toplam Hesaplama
function toplamHesapla(){
    // Tüm odaklanmaları kaldırarak yeşil çerçeveleri temizle
    document.querySelectorAll("input").forEach(i => i.blur());

    let btn = document.getElementById("hesaplaBtn");
    btn.classList.add("clicked-blue");

    let toplam = 0;
    for(let i=1; i<=8; i++){
        toplam += parseTR("sayi"+i);
    }

    document.getElementById("toplamSonuc").innerText =
    toplam.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById("sonucAlani").style.display = "block";
}

// Hesap Sonucunu Gizleme (UI Reset)
function hesapGecersizYap(){
    document.getElementById("sonucAlani").style.display = "none";
    document.getElementById("hesaplaBtn").classList.remove("clicked-blue");
}

// Dinamik Olay Dinleyicileri (Input & Focus)
document.querySelectorAll("input").forEach(el => {

    el.addEventListener("input", () => {
        hesapGecersizYap();
        document.querySelector(".reset-btn").classList.remove("active-reset");
    });
    
    el.addEventListener("focus", () => {
        setTimeout(() => { el.select(); }, 50);
    });

});

// Enter Tuşu ile Sıralı Geçiş ve Hesaplama
const alanlar = Array.from(document.querySelectorAll("input"));
alanlar.forEach((el, i) => {
    el.addEventListener("keydown", (e) => {
        if(e.key === "Enter"){
            e.preventDefault();
            document.activeElement.blur();

            let next = alanlar[i+1];
            if(next){
                setTimeout(() => {
                    next.focus();
                    next.select();
                }, 0);
            } else {
                toplamHesapla();
            }
        }
    });
});

// Sıfırlama (↺) Fonksiyonu
function sifirla(e){
    e.preventDefault();

    document.querySelectorAll("input").forEach(i => i.value = "");
    hesapGecersizYap();

    let resetBtn = e.currentTarget;
    resetBtn.classList.add("active-reset");
}

</script>

</body>
</html>
