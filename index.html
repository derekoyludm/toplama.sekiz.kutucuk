<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>8 Sayı Toplama</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background-color:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    width:100vw;
    margin:0;
    padding:15px;
}

.container{
    background-color:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    width:100%;
    max-width:420px;
    text-align:center;
}

h2{
    color:#2c3e50;
    margin-top:0;
    margin-bottom:20px;
    font-size:22px;
}

.input-group{
    margin-bottom:14px;
    text-align:left;
}

label{
    font-size:13px;
    color:#7f8c8d;
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

.field-container{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
}

.field-container input{
    width:100%;
    min-width:0;
}

input[type="text"]{
    flex:1;
    height:46px;
    padding:0 12px;
    border:2px solid #bdc3c7;
    border-radius:6px;
    font-size:16px;
    text-align:center;
    transition:border-color 0.3s;
    -webkit-appearance:none;
    appearance:none;
}

input[type="text"]:focus{
    border-color:#9b59b6;
    outline:none;
}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    flex-shrink:0;
    touch-action:manipulation;
}

.clear-btn:hover{
    background:#2587ca;
}

button{
    background-color:#9b59b6;
    color:white;
    border:none;
    height:48px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    width:100%;
    font-weight:bold;
    transition:background-color 0.3s;
    margin-top:10px;
    -webkit-appearance:none;
}

button:hover{
    background-color:#8e44ad;
}

.result{
    margin-top:20px;
    padding:18px;
    background-color:#f5eef8;
    border-radius:8px;
    display:none;
}

.result p{
    margin:0;
    font-size:18px;
    font-weight:bold;
    color:#2c3e50;
}

.toplam-renk{
    color:#27ae60;
    font-size:24px;
}

</style>
</head>

<body>

<div class="container">

<h2>8 Sayı Toplama</h2>

<div id="kutular"></div>

<button onclick="toplamHesapla()">
Toplamı Hesapla
</button>

<div class="result" id="sonucAlani">

<p>
Toplam<br><br>
<span class="toplam-renk" id="toplamSonuc">0,00</span>
</p>

</div>

</div>

<script>

for(let i = 1; i <= 8; i++){

    document.getElementById("kutular").innerHTML += `

    <div class="input-group">

        <label>${i}. Sayı</label>

        <div class="field-container">

            <input
            type="text"
            id="sayi${i}"
            inputmode="decimal"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            onkeydown="if(event.key==='Enter'){event.preventDefault();toplamHesapla();}"
            >

            <div
            class="clear-btn"
            ontouchstart="temizleKutu(event,'sayi${i}')"
            onclick="temizleKutu(event,'sayi${i}')"
            >×</div>

        </div>

    </div>

    `;

}

function temizleKutu(event,id){

    event.preventDefault();

    let input = document.getElementById(id);

    input.value = "";

    setTimeout(function(){

        input.focus();

    },10);

}

function temizleVeCevir(deger){

    let temiz = deger.trim()
        .replace(/\./g,'')
        .replace(',','.');

    return parseFloat(temiz) || 0;

}

function toplamHesapla(){

    let toplam = 0;

    for(let i = 1; i <= 8; i++){

        let raw = document.getElementById("sayi" + i).value;

        toplam += temizleVeCevir(raw);

    }

    document.getElementById("toplamSonuc").innerText =
        toplam.toLocaleString('tr-TR',{
            minimumFractionDigits:2,
            maximumFractionDigits:2
        });

    document.getElementById("sonucAlani").style.display = "block";

}

</script>

</body>
</html>
